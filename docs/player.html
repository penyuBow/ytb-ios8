<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>YTube Player</title>
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }
    html, body { background: #000; font-family: -apple-system, 'Helvetica Neue', sans-serif; }

    .header {
      background: #111;
      padding: 10px 14px;
      border-bottom: 1px solid #222;
      overflow: hidden;
    }
    .back-btn {
      color: #fff; background: none; border: none;
      font-size: 16px; -webkit-appearance: none;
      padding: 6px 0; cursor: pointer; float: left;
    }
    .back-btn:active { color: #aaa; }
    .ver { color: #444; font-size: 11px; float: right; line-height: 32px; }

    /* Poster thumbnail + play button */
    #poster { width: 100%; background: #111; position: relative; cursor: pointer; }
    #poster img { display: block; width: 100%; height: auto; }
    .play-circle {
      position: absolute; top: 50%; left: 50%;
      width: 72px; height: 72px;
      margin-top: -36px; margin-left: -36px;
      background: rgba(200, 0, 0, 0.88);
      border-radius: 50%; -webkit-border-radius: 50%;
      text-align: center; line-height: 72px;
      font-size: 30px; color: #fff;
    }

    /* Nút mở YouTube — luôn hiển thị, to, dễ bấm */
    .yt-btn {
      display: block;
      margin: 14px 16px 4px;
      padding: 14px;
      background: #cc0000;
      color: #fff;
      text-align: center;
      border-radius: 8px; -webkit-border-radius: 8px;
      font-size: 16px; font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.2px;
    }
    .yt-btn:active { background: #aa0000; }
    .yt-note {
      color: #666; font-size: 12px;
      text-align: center; padding: 4px 16px 14px;
    }

    /* iframe wrap */
    #player-wrap { width: 100%; background: #000; display: none; }
    #player-wrap iframe {
      display: block; border: 0;
      width: 100%; height: 56.25vw;
      /* Force GPU layer — fix WebKit rotation bug trên iOS cũ */
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    .divider { border: none; border-top: 1px solid #222; margin: 0; }

    .video-info { padding: 14px 16px; background: #111; }
    .video-title { color: #fff; font-size: 15px; font-weight: 600; line-height: 1.45; margin-bottom: 6px; }
    .video-channel { color: #aaa; font-size: 13px; }

    .err { color: #ff6666; padding: 40px 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back()">&#8592; Quay l&#7841;i</button>
    <span class="ver">v7</span>
  </div>

  <div id="poster">
    <img id="thumb" src="" alt="">
    <div class="play-circle">&#9654;</div>
  </div>

  <div id="player-wrap"></div>

  <div id="video-info" class="video-info"></div>

  <!-- Nút mở m.youtube.com — luôn có, nhẹ hơn youtube.com nhiều -->
  <a id="yt-btn" class="yt-btn" href="" target="_self">
    &#9654; Xem video tr&#234;n YouTube
  </a>
  <p class="yt-note">M&#7903; m.youtube.com trong trang n&#224;y (nh&#7865; h&#417;n)</p>

  <script>
    var params = {};
    try {
      var hash = window.location.hash.slice(1);
      var parts = hash.split('&');
      for (var i = 0; i < parts.length; i++) {
        var kv = parts[i].split('=');
        if (kv.length >= 2) {
          params[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('='));
        }
      }
    } catch (e) {}

    var videoId = params.v || '';
    var title   = params.t || '';
    var channel = params.c || '';

    if (!videoId) {
      document.getElementById('poster').innerHTML =
        '<div class="err">Kh&#244;ng t&#236;m th&#7845;y video. ' +
        '<a href="index.html" style="color:#ff6666">Quay l&#7841;i</a></div>';
    } else {
      document.getElementById('thumb').src =
        'https://img.youtube.com/vi/' + videoId + '/mqdefault.jpg';

      document.getElementById('video-info').innerHTML =
        '<div class="video-title">' + esc(title) + '</div>' +
        '<div class="video-channel">' + esc(channel) + '</div>';

      // Nút mở m.youtube.com (nhẹ, chạy tốt trên iOS cũ)
      document.getElementById('yt-btn').href =
        'https://m.youtube.com/watch?v=' + videoId;

      // Tap thumbnail → thử phát inline bằng iframe
      document.getElementById('poster').onclick = loadPlayer;
    }

    function loadPlayer() {
      document.getElementById('poster').onclick = null;
      document.getElementById('poster').style.display = 'none';

      var w = window.innerWidth || 320;
      var h = Math.round(w * 9 / 16);

      var wrap = document.getElementById('player-wrap');
      wrap.style.display = 'block';

      var iframe = document.createElement('iframe');
      // Set cả attribute (YouTube đọc) lẫn CSS (browser layout)
      iframe.setAttribute('width',                  String(w));
      iframe.setAttribute('height',                 String(h));
      iframe.setAttribute('frameborder',            '0');
      iframe.setAttribute('allowfullscreen',        'allowfullscreen');
      iframe.setAttribute('webkit-allowfullscreen', '');
      iframe.setAttribute('allow',                  'autoplay; fullscreen');

      wrap.appendChild(iframe);

      iframe.src = 'https://www.youtube.com/embed/' + videoId
        + '?autoplay=1'
        + '&rel=0'
        + '&fs=1';
    }

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
