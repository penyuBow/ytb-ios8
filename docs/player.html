<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>YTube Player</title>
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }
    html, body { background: #000; }

    .header {
      background: #111;
      padding: 10px 14px;
      border-bottom: 1px solid #222;
    }
    .back-btn {
      color: #fff;
      background: none;
      border: none;
      font-size: 16px;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      -webkit-appearance: none;
      padding: 6px 0;
      cursor: pointer;
    }
    .back-btn:active { color: #aaa; }

    /* Poster thumbnail + play button */
    #poster {
      width: 100%;
      background: #111;
      position: relative;
      cursor: pointer;
    }
    #poster img {
      display: block;
      width: 100%;
      height: auto;
    }
    .play-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 72px;
      height: 72px;
      margin-top: -36px;
      margin-left: -36px;
      background: rgba(200, 0, 0, 0.88);
      border-radius: 50%;
      -webkit-border-radius: 50%;
      text-align: center;
      line-height: 72px;
      font-size: 30px;
      color: #fff;
    }

    /* iframe wrap — CSS sizing only, không JS can thiệp */
    #player-wrap {
      width: 100%;
      background: #000;
      display: none;
    }
    #player-wrap iframe {
      display: block;
      border: 0;
      width: 100%;
      height: 56.25vw; /* 9/16 * 100vw — iOS 6+ hỗ trợ vw */
    }

    .video-info {
      padding: 14px 16px;
      background: #111;
    }
    .video-title {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      line-height: 1.45;
      margin-bottom: 6px;
    }
    .video-channel {
      color: #aaa;
      font-size: 13px;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
    }

    #fallback {
      display: block;
      text-align: center;
      padding: 14px 16px;
      background: #111;
      border-top: 1px solid #222;
      color: #888;
      font-size: 13px;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      text-decoration: none;
    }
    #fallback span { color: #ff6666; }

    .err {
      color: #ff6666;
      padding: 40px 20px;
      text-align: center;
      font-family: -apple-system, sans-serif;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back()">&#8592; Quay l&#7841;i</button>
  </div>

  <div id="poster">
    <img id="thumb" src="" alt="">
    <div class="play-circle">&#9654;</div>
  </div>

  <div id="player-wrap"></div>
  <div id="video-info" class="video-info"></div>
  <a id="fallback" href="" target="_blank">
    Kh&#244;ng xem &#273;&#432;&#7907;c? <span>M&#7903; tr&#7921;c ti&#7871;p tr&#234;n YouTube &#8599;</span>
  </a>

  <script>
    var params = {};
    try {
      var hash = window.location.hash.slice(1);
      var parts = hash.split('&');
      for (var i = 0; i < parts.length; i++) {
        var kv = parts[i].split('=');
        if (kv.length >= 2) {
          params[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('='));
        }
      }
    } catch (e) {}

    var videoId = params.v || '';
    var title   = params.t || '';
    var channel = params.c || '';

    if (!videoId) {
      document.getElementById('poster').innerHTML =
        '<div class="err">Kh&#244;ng t&#236;m th&#7845;y video. ' +
        '<a href="index.html" style="color:#ff6666">Quay l&#7841;i</a></div>';
    } else {
      document.getElementById('thumb').src =
        'https://img.youtube.com/vi/' + videoId + '/mqdefault.jpg';

      document.getElementById('video-info').innerHTML =
        '<div class="video-title">' + esc(title) + '</div>' +
        '<div class="video-channel">' + esc(channel) + '</div>';

      document.getElementById('fallback').href =
        'https://m.youtube.com/watch?v=' + videoId;

      document.getElementById('poster').onclick = loadPlayer;
    }

    function loadPlayer() {
      document.getElementById('poster').onclick = null;
      document.getElementById('poster').style.display = 'none';

      var wrap = document.getElementById('player-wrap');
      wrap.style.display = 'block';

      // Kích thước chỉ qua CSS (56.25vw) — không set pixel bằng JS
      // Tránh YouTube player override kích thước JS-set trên iOS cũ
      var iframe = document.createElement('iframe');
      iframe.setAttribute('frameborder',            '0');
      iframe.setAttribute('allowfullscreen',        'allowfullscreen');
      iframe.setAttribute('webkit-allowfullscreen', '');
      iframe.setAttribute('allow',                  'autoplay; fullscreen');

      wrap.appendChild(iframe);

      // Dùng youtube-nocookie.com: player đơn giản hơn, ít JS nội bộ hơn
      // Không dùng playsinline: iOS 8-10 mở native fullscreen player (đúng cách)
      iframe.src = 'https://www.youtube-nocookie.com/embed/' + videoId
        + '?autoplay=1'
        + '&rel=0'
        + '&fs=1';
    }

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
