<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>YTube Player</title>
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }
    html, body { background: #000; font-family: -apple-system, 'Helvetica Neue', sans-serif; }

    .header {
      background: #111; padding: 10px 14px;
      border-bottom: 1px solid #222; overflow: hidden;
    }
    .back-btn {
      color: #fff; background: none; border: none; font-size: 16px;
      -webkit-appearance: none; padding: 6px 0; cursor: pointer; float: left;
    }
    .back-btn:active { color: #aaa; }
    .ver { color: #444; font-size: 11px; float: right; line-height: 32px; }

    /* ===== THUMBNAIL ===== */
    #poster { width: 100%; background: #111; position: relative; cursor: pointer; display: block; }
    #poster img { display: block; width: 100%; height: auto; }
    .play-circle {
      position: absolute; top: 50%; left: 50%;
      width: 72px; height: 72px; margin-top: -36px; margin-left: -36px;
      background: rgba(200,0,0,0.92); border-radius: 50%; -webkit-border-radius: 50%;
      text-align: center; line-height: 72px; font-size: 30px; color: #fff;
    }

    /* ===== INFO ===== */
    .video-info { padding: 16px; background: #111; border-bottom: 1px solid #222; }
    .video-title { color: #fff; font-size: 16px; font-weight: 600; line-height: 1.45; margin-bottom: 6px; }
    .video-channel { color: #aaa; font-size: 13px; }

    /* ===== BUTTONS ===== */
    .actions { padding: 18px 16px 8px; }
    .btn {
      display: block; width: 100%; margin-bottom: 12px; padding: 15px;
      text-align: center; border-radius: 9px; -webkit-border-radius: 9px;
      font-size: 16px; font-weight: 600; text-decoration: none;
      -webkit-appearance: none; border: none; cursor: pointer;
    }
    .btn-primary  { background: #cc0000; color: #fff; }
    .btn-primary:active { background: #aa0000; }
    .btn-secondary { background: #222; color: #fff; border: 1px solid #333; }
    .btn-secondary:active { background: #2c2c2c; }

    .hint { color: #555; font-size: 12px; text-align: center; padding: 6px 24px 20px; line-height: 1.5; }

    .err { color: #ff6666; padding: 40px 20px; text-align: center; }
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">&#8592; Quay l&#7841;i</button>
  <span class="ver">v12</span>
</div>

<!-- Thumbnail (bấm = mở YouTube) -->
<a id="poster" href="#">
  <img id="thumb" src="" alt="">
  <div class="play-circle">&#9654;</div>
</a>

<div id="video-info" class="video-info"></div>

<div class="actions" id="actions">
  <a id="btn-app" class="btn btn-primary" href="#">&#9654; M&#7903; trong app YouTube</a>
  <a id="btn-web" class="btn btn-secondary" href="#" target="_self">M&#7903; tr&#234;n web (Safari)</a>
</div>
<p class="hint">
  N&#7871;u c&#243; app YouTube, n&#250;t &#273;&#7887; m&#7903; th&#7859;ng app (m&#432;&#7907;t nh&#7845;t).<br>
  Ch&#432;a c&#243; app th&#236; d&#249;ng n&#250;t &#8220;M&#7903; tr&#234;n web&#8221;.
</p>

<script>
  var params = {};
  try {
    var hash = window.location.hash.slice(1);
    var parts = hash.split('&');
    for (var i = 0; i < parts.length; i++) {
      var kv = parts[i].split('=');
      if (kv.length >= 2) {
        params[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('='));
      }
    }
  } catch (e) {}

  var videoId = params.v || '';
  var title   = params.t || '';
  var channel = params.c || '';

  var WEB_URL = 'https://m.youtube.com/watch?v=' + videoId;
  var APP_URL = 'youtube://watch?v=' + videoId;   // mở app YouTube (nếu đã cài)

  if (!videoId) {
    document.body.innerHTML =
      '<div class="err">Kh&#244;ng t&#236;m th&#7845;y video. ' +
      '<a href="index.html" style="color:#ff6666">Quay l&#7841;i</a></div>';
  } else {
    document.getElementById('thumb').src =
      'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg';

    document.getElementById('video-info').innerHTML =
      '<div class="video-title">' + esc(title) + '</div>' +
      '<div class="video-channel">' + esc(channel) + '</div>';

    document.getElementById('btn-web').href = WEB_URL;
    document.getElementById('btn-app').onclick = openApp;
    document.getElementById('poster').onclick  = openApp;
  }

  // Mở app YouTube; nếu sau ~1.5s vẫn còn ở trang này (chưa cài app) thì
  // tự chuyển sang web. Đây là mẫu deep-link fallback chuẩn cho iOS.
  function openApp(e) {
    if (e && e.preventDefault) e.preventDefault();

    var t = Date.now();
    var fallback = setTimeout(function () {
      // Nếu trang vẫn hiển thị (app không mở được) => mở web
      if (Date.now() - t < 2100 && !document.hidden) {
        window.location.href = WEB_URL;
      }
    }, 1500);

    // Nếu app mở, trang bị ẩn => huỷ fallback để không nhảy web khi quay lại
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) clearTimeout(fallback);
    });

    window.location.href = APP_URL;
    return false;
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
