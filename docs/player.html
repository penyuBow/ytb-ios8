<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>YTube Player</title>
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }
    html, body { background: #000; font-family: -apple-system, 'Helvetica Neue', sans-serif; }

    .header { background: #111; padding: 10px 14px; border-bottom: 1px solid #222; overflow: hidden; }
    .back-btn { color: #fff; background: none; border: none; font-size: 16px; -webkit-appearance: none; padding: 6px 0; cursor: pointer; float: left; }
    .back-btn:active { color: #aaa; }
    .ver { color: #444; font-size: 11px; float: right; line-height: 32px; }

    /* ===== POSTER ===== */
    #poster { width: 100%; background: #111; position: relative; cursor: pointer; }
    #poster img { display: block; width: 100%; height: auto; }
    .play-circle {
      position: absolute; top: 50%; left: 50%;
      width: 72px; height: 72px; margin-top: -36px; margin-left: -36px;
      background: rgba(200,0,0,0.88); border-radius: 50%; -webkit-border-radius: 50%;
      text-align: center; line-height: 72px; font-size: 30px; color: #fff;
    }
    .poster-note { text-align: center; padding: 8px 16px 12px; color: #555; font-size: 12px; background: #111; }

    /* ===== LOADING SPINNER =====
       Dùng padding-bottom + absolute để spinner luôn nằm chính giữa vùng
       16:9 — tránh lỗi margin:auto không hoạt động đúng trên iOS 8. */
    #loading {
      display: none;
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 — tạo chiều cao bằng padding, không phải height */
      height: 0;
      background: #000;
    }
    .spinner {
      position: absolute;
      top: 50%; left: 50%;
      width: 40px; height: 40px;
      margin-top: -20px; margin-left: -20px;
      border: 3px solid #333;
      border-top-color: #ff0000;
      border-radius: 50%; -webkit-border-radius: 50%;
      -webkit-animation: spin .8s linear infinite;
      animation: spin .8s linear infinite;
    }
    @-webkit-keyframes spin { to { -webkit-transform: rotate(360deg); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== YOUTUBE IFRAME =====
       Dùng padding-bottom: 56.25% thay cho height: 56.25vw.
       Cách này tính padding theo CHIỀU RỘNG thực tế của element (không phải
       viewport), nên đúng cả khi xoay máy và không bị cắt trên iOS cũ. */
    #player-wrap {
      display: none;
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      background: #000;
      overflow: hidden;
    }
    #player-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
      /* GPU layer — tránh flicker khi xoay trên iOS */
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    /* ===== INFO + FALLBACK ===== */
    .video-info { padding: 14px 16px; background: #111; border-top: 1px solid #222; }
    .video-title { color: #fff; font-size: 15px; font-weight: 600; line-height: 1.45; margin-bottom: 6px; }
    .video-channel { color: #aaa; font-size: 13px; }

    .yt-btn {
      display: block; margin: 14px 16px 4px; padding: 14px;
      background: #cc0000; color: #fff; text-align: center;
      border-radius: 8px; -webkit-border-radius: 8px;
      font-size: 16px; font-weight: 600; text-decoration: none;
    }
    .yt-btn:active { background: #aa0000; }
    .yt-note { color: #555; font-size: 12px; text-align: center; padding: 4px 16px 20px; }

    .err { color: #ff6666; padding: 40px 20px; text-align: center; }
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">&#8592; Quay l&#7841;i</button>
  <span class="ver">v14</span>
</div>

<div id="poster">
  <img id="thumb" src="" alt="">
  <div class="play-circle">&#9654;</div>
</div>
<p class="poster-note" id="poster-note">Nh&#7845;n &#7843;nh &#273;&#7875; xem video</p>

<!-- Spinner hiện trong lúc iframe YouTube đang tải -->
<div id="loading"><div class="spinner"></div></div>

<!-- YouTube iframe — được nhét vào đây bằng JS sau khi tap -->
<div id="player-wrap"></div>

<div id="video-info" class="video-info"></div>

<a id="yt-btn" class="yt-btn" href="" target="_self">
  &#9654; M&#7903; tr&#234;n YouTube (d&#7921; ph&#242;ng)
</a>
<p class="yt-note">N&#7871;u player kh&#244;ng t&#7843;i, nh&#7845;n n&#250;t n&#224;y</p>

<script>
  var params = {};
  try {
    var hash = window.location.hash.slice(1);
    var parts = hash.split('&');
    for (var i = 0; i < parts.length; i++) {
      var kv = parts[i].split('=');
      if (kv.length >= 2) {
        params[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('='));
      }
    }
  } catch (e) {}

  var videoId = params.v || '';
  var title   = params.t || '';
  var channel = params.c || '';

  if (!videoId) {
    document.getElementById('poster').innerHTML =
      '<div class="err">Kh&#244;ng t&#236;m th&#7845;y video. ' +
      '<a href="index.html" style="color:#ff6666">Quay l&#7841;i</a></div>';
  } else {
    document.getElementById('thumb').src =
      'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg';

    document.getElementById('video-info').innerHTML =
      '<div class="video-title">' + esc(title) + '</div>' +
      '<div class="video-channel">' + esc(channel) + '</div>';

    document.getElementById('yt-btn').href =
      'https://m.youtube.com/watch?v=' + videoId;

    document.getElementById('poster').onclick = loadPlayer;
  }

  function loadPlayer() {
    document.getElementById('poster').style.display      = 'none';
    document.getElementById('poster-note').style.display = 'none';
    document.getElementById('loading').style.display     = 'block';

    var iframe = document.createElement('iframe');
    iframe.setAttribute('frameborder',            '0');
    iframe.setAttribute('allowfullscreen',        'allowfullscreen');
    iframe.setAttribute('webkit-allowfullscreen', '');
    iframe.setAttribute('allow',                  'autoplay; fullscreen');

    var wrap = document.getElementById('player-wrap');
    wrap.appendChild(iframe);

    iframe.onload = function () {
      document.getElementById('loading').style.display    = 'none';
      document.getElementById('player-wrap').style.display = 'block';
    };

    // playsinline=1 → phát ngay trong trang (không bắt vào fullscreen)
    // người dùng vẫn bấm nút fullscreen tuỳ ý
    iframe.src = 'https://www.youtube.com/embed/' + videoId
      + '?autoplay=1'
      + '&playsinline=1'
      + '&rel=0'
      + '&fs=1';
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
